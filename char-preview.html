<!DOCTYPE html>
<html><head><meta charset="utf-8"><title>Character designs</title>
<style>body{margin:0;background:#0e1320;color:#e8edf5;font-family:"Segoe UI",sans-serif}
h1{font-size:18px;padding:12px 16px 0}p{padding:0 16px;color:#8899bb;margin:4px 0 8px}</style></head>
<body>
<h1>Scramble Racers — character design options</h1>
<p>Each design shown big (red) + the other 3 player colors. Pick the one you like (A / B / C / D) — or mix-and-match.</p>
<canvas id="c" width="960" height="620"></canvas>
<script>
const ctx = document.getElementById('c').getContext('2d');
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}
const COLORS=['#ff5a5a','#4aa3ff','#5fd07a','#ffd24d'];

// ---- shared cute face bits ----
function cheeks(cx,ey,sp){ctx.fillStyle='rgba(255,120,150,.55)';ctx.beginPath();ctx.ellipse(cx-sp,ey+9,5,3.4,0,0,7);ctx.ellipse(cx+sp,ey+9,5,3.4,0,0,7);ctx.fill();}
function eyes(cx,ey,sp,r){ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-sp,ey,r,0,7);ctx.arc(cx+sp,ey,r,0,7);ctx.fill();
  ctx.fillStyle='#1a1a22';ctx.beginPath();ctx.arc(cx-sp,ey+1,r*0.5,0,7);ctx.arc(cx+sp,ey+1,r*0.5,0,7);ctx.fill();
  ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx-sp-1.5,ey-1.5,r*0.18,0,7);ctx.arc(cx+sp-1.5,ey-1.5,r*0.18,0,7);ctx.fill();}

// A — BEAN: tall soft rounded body, antenna, big eyes
function designA(cx,foot,s,col){const w=44*s,h=60*s,x=cx-w/2,y=foot-h;
  ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(cx-8*s,foot,7*s,4*s,0,0,7);ctx.ellipse(cx+8*s,foot,7*s,4*s,0,0,7);ctx.fill();
  ctx.strokeStyle=col;ctx.lineWidth=3*s;ctx.beginPath();ctx.moveTo(cx,y+4*s);ctx.lineTo(cx,y-9*s);ctx.stroke();
  ctx.fillStyle=col;ctx.beginPath();ctx.arc(cx,y-11*s,4*s,0,7);ctx.fill();
  ctx.fillStyle=col;rr(x,y,w,h,18*s);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';rr(x+4*s,y+4*s,w-8*s,h*0.45,12*s);ctx.fill();
  cheeks(cx,y+26*s,15*s);eyes(cx,y+22*s,10*s,7*s);
  ctx.strokeStyle='#1a1a22';ctx.lineWidth=2*s;ctx.beginPath();ctx.arc(cx,y+30*s,5*s,0.15*Math.PI,0.85*Math.PI);ctx.stroke();}

// B — SLIME/MARSHMALLOW: wide wobbly dome, glossy, :3 mouth
function designB(cx,foot,s,col){const w=58*s,h=46*s,y=foot-h;
  ctx.fillStyle=col;ctx.beginPath();
  ctx.moveTo(cx-w/2,foot);
  ctx.bezierCurveTo(cx-w/2-4*s,foot-h*1.05,cx+w/2+4*s,foot-h*1.05,cx+w/2,foot);
  // wobbly bottom
  ctx.lineTo(cx+w/2,foot);ctx.quadraticCurveTo(cx+w*0.25,foot+5*s,cx,foot);ctx.quadraticCurveTo(cx-w*0.25,foot+5*s,cx-w/2,foot);
  ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.30)';ctx.beginPath();ctx.ellipse(cx-10*s,y+14*s,9*s,6*s,-0.4,0,7);ctx.fill();
  cheeks(cx,y+24*s,14*s);eyes(cx,y+20*s,9*s,7*s);
  // :3 mouth
  ctx.strokeStyle='#1a1a22';ctx.lineWidth=2*s;ctx.beginPath();
  ctx.arc(cx-3*s,y+28*s,3*s,0,Math.PI);ctx.arc(cx+3*s,y+28*s,3*s,0,Math.PI);ctx.stroke();}

// C — KITTY: round body, ears, whiskers, tiny nose
function designC(cx,foot,s,col){const w=48*s,h=52*s,x=cx-w/2,y=foot-h;
  ctx.fillStyle='#2a2a2a';ctx.beginPath();ctx.ellipse(cx-7*s,foot,6*s,3.5*s,0,0,7);ctx.ellipse(cx+7*s,foot,6*s,3.5*s,0,0,7);ctx.fill();
  // ears
  ctx.fillStyle=col;ctx.beginPath();ctx.moveTo(cx-15*s,y+6*s);ctx.lineTo(cx-22*s,y-12*s);ctx.lineTo(cx-5*s,y+2*s);ctx.closePath();
  ctx.moveTo(cx+15*s,y+6*s);ctx.lineTo(cx+22*s,y-12*s);ctx.lineTo(cx+5*s,y+2*s);ctx.closePath();ctx.fill();
  ctx.fillStyle='#ff9ec0';ctx.beginPath();ctx.moveTo(cx-15*s,y+2*s);ctx.lineTo(cx-19*s,y-7*s);ctx.lineTo(cx-9*s,y);ctx.closePath();
  ctx.moveTo(cx+15*s,y+2*s);ctx.lineTo(cx+19*s,y-7*s);ctx.lineTo(cx+9*s,y);ctx.closePath();ctx.fill();
  ctx.fillStyle=col;rr(x,y,w,h,22*s);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.2)';rr(x+4*s,y+4*s,w-8*s,h*0.4,14*s);ctx.fill();
  cheeks(cx,y+26*s,16*s);eyes(cx,y+22*s,10*s,6.5*s);
  ctx.fillStyle='#d36a86';ctx.beginPath();ctx.moveTo(cx-2.5*s,y+27*s);ctx.lineTo(cx+2.5*s,y+27*s);ctx.lineTo(cx,y+30*s);ctx.closePath();ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.7)';ctx.lineWidth=1.3*s;ctx.beginPath();
  ctx.moveTo(cx-13*s,y+25*s);ctx.lineTo(cx-24*s,y+23*s);ctx.moveTo(cx-13*s,y+28*s);ctx.lineTo(cx-24*s,y+29*s);
  ctx.moveTo(cx+13*s,y+25*s);ctx.lineTo(cx+24*s,y+23*s);ctx.moveTo(cx+13*s,y+28*s);ctx.lineTo(cx+24*s,y+29*s);ctx.stroke();}

// D — CHICK: egg body, beak, wing nubs, little legs
function designD(cx,foot,s,col){const w=46*s,h=56*s,y=foot-h;
  ctx.strokeStyle='#f0a830';ctx.lineWidth=2.4*s;ctx.beginPath();
  ctx.moveTo(cx-6*s,foot-3*s);ctx.lineTo(cx-6*s,foot+4*s);ctx.moveTo(cx-9*s,foot+4*s);ctx.lineTo(cx-3*s,foot+4*s);
  ctx.moveTo(cx+6*s,foot-3*s);ctx.lineTo(cx+6*s,foot+4*s);ctx.moveTo(cx+3*s,foot+4*s);ctx.lineTo(cx+9*s,foot+4*s);ctx.stroke();
  ctx.fillStyle=col;ctx.beginPath();ctx.ellipse(cx,y+h/2,w/2,h/2,0,0,7);ctx.fill();
  // wings
  ctx.fillStyle='rgba(0,0,0,.10)';ctx.beginPath();ctx.ellipse(cx-w/2+3*s,y+h*0.55,6*s,11*s,0.2,0,7);ctx.ellipse(cx+w/2-3*s,y+h*0.55,6*s,11*s,-0.2,0,7);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.22)';ctx.beginPath();ctx.ellipse(cx-7*s,y+16*s,9*s,7*s,-0.3,0,7);ctx.fill();
  cheeks(cx,y+25*s,14*s);eyes(cx,y+21*s,8*s,6.5*s);
  ctx.fillStyle='#ffae34';ctx.beginPath();ctx.moveTo(cx-4*s,y+27*s);ctx.lineTo(cx+4*s,y+27*s);ctx.lineTo(cx,y+32*s);ctx.closePath();ctx.fill();}

const designs=[['A · Bean',designA],['B · Marshmallow',designB],['C · Kitty',designC],['D · Chick',designD]];
function frame(){
  ctx.fillStyle='#0e1320';ctx.fillRect(0,0,960,620);
  // soft stage strip
  ctx.fillStyle='#16213a';ctx.fillRect(0,150,960,260);
  designs.forEach((d,i)=>{
    const cx=120+i*220;
    ctx.fillStyle='#cfe0ff';ctx.font='bold 16px Segoe UI';ctx.textAlign='center';ctx.fillText(d[0],cx,135);
    // ground line
    ctx.strokeStyle='rgba(255,255,255,.12)';ctx.beginPath();ctx.moveTo(cx-90,360);ctx.lineTo(cx+90,360);ctx.stroke();
    d[1](cx,360,2.0,COLORS[0]);                 // big red
    // small swatches in the other 3 colors
    for(let k=1;k<4;k++) d[1](cx-60+(k-1)*60,560,0.95,COLORS[k]);
  });
  ctx.fillStyle='#8899bb';ctx.font='13px Segoe UI';ctx.textAlign='center';
  ctx.fillText('(other player colors)',480,600);
}
frame();
</script>
</body></html>
