<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scramble Racers</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0e1320;
    color: #e8edf5;
    font-family: "Segoe UI", system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    text-align: center;
    padding: 2rem;
  }
  h1 {
    font-size: 3rem;
    font-weight: 900;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }
  .subtitle {
    color: #8899bb;
    font-size: 1.1rem;
    margin-bottom: 3rem;
  }
  .buttons {
    display: flex;
    gap: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }
  .btn {
    display: block;
    padding: 1.2rem 2.5rem;
    border-radius: 12px;
    font-size: 1.1rem;
    font-weight: 700;
    text-decoration: none;
    letter-spacing: 1px;
    text-transform: uppercase;
    transition: transform 0.1s, opacity 0.1s;
  }
  .btn:hover { transform: scale(1.04); opacity: 0.9; }
  .btn-mp {
    background: #f5c518;
    color: #0e1320;
  }
  .btn-sp {
    background: #2a3a5a;
    color: #e8edf5;
    border: 2px solid #3a4a6a;
  }
  .tag {
    display: inline-block;
    background: #1c2940;
    color: #8899bb;
    font-size: 0.75rem;
    padding: 0.2rem 0.6rem;
    border-radius: 99px;
    margin-top: 0.4rem;
  }
</style>
</head>
<body>
  <h1>&#x2638; Scramble Racers</h1>
  <p class="subtitle">2D platformer racing &mdash; collect coins, buy upgrades, race your friends!</p>
  <div class="buttons">
    <a href="/race.html" class="btn btn-mp">
      &#x1F4BB; Play Online &mdash; Multiplayer
      <br><span class="tag">Up to 4 players &bull; Firebase live sync</span>
    </a>
    <a href="/coins.html" class="btn btn-sp">
      &#x1F3AE; Single Player
      <br><span class="tag">Play solo vs CPUs</span>
    </a>
  </div>
</body>
</html>
