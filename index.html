<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Scramble Racers — Prototype</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: #0e1320;
    color: #e8edf5;
    font-family: "Segoe UI", system-ui, sans-serif;
    overflow: hidden;
  }
  #wrap {
    width: 960px; margin: 0 auto; position: relative;
  }
  h1 { font-size: 22px; margin: 8px 0; letter-spacing: 1px; }
  canvas {
    display: block; background: #87b7e8;
    border-radius: 8px; box-shadow: 0 8px 30px rgba(0,0,0,.5);
  }
  /* overlay panels */
  .panel {
    position: absolute; inset: 0;
    background: rgba(10,14,25,.94);
    border-radius: 8px;
    padding: 18px 22px;
    overflow-y: auto;
    display: none;
  }
  .panel.show { display: block; }
  .panel h2 { margin: 4px 0 2px; font-size: 24px; }
  .panel .sub { color: #9fb0c8; margin: 0 0 14px; font-size: 14px; }
  .slots { display: flex; gap: 12px; }
  .slot { flex: 1; }
  .slot .slot-title {
    font-weight: 700; font-size: 13px; text-transform: uppercase;
    letter-spacing: 1px; color: #7fd1ff; margin-bottom: 8px; text-align:center;
  }
  .card {
    background: #1b2540; border: 2px solid #2c3a63; border-radius: 10px;
    padding: 10px; margin-bottom: 10px; cursor: pointer;
    transition: transform .08s, border-color .08s, background .08s;
  }
  .card:hover { transform: translateY(-2px); border-color: #4d6bb3; }
  .card.sel { border-color: #ffd24d; background: #2a3358; box-shadow: 0 0 0 2px #ffd24d inset; }
  .card .cname { font-weight: 700; font-size: 15px; }
  .card .cicon { font-size: 18px; margin-right: 7px; vertical-align: -1px; }
  .card .cdesc { font-size: 12px; color: #aab8d0; margin-top: 4px; line-height: 1.3; }
  .btn {
    background: #ffd24d; color: #1a1f30; border: none; border-radius: 8px;
    padding: 12px 26px; font-size: 16px; font-weight: 800; cursor: pointer;
    margin-top: 6px; letter-spacing: .5px;
  }
  .btn:disabled { background: #4a5266; color: #8a92a8; cursor: not-allowed; }
  .btn.alt { background: #4d6bb3; color:#fff; }
  .row { display:flex; gap:24px; align-items:flex-start; }
  .scorebox { background:#141c33; border-radius:10px; padding:12px 16px; min-width:240px; }
  .scorebox table { width:100%; border-collapse: collapse; font-size:14px; }
  .scorebox td { padding:4px 6px; }
  .scorebox tr.you td { color:#ffd24d; font-weight:700; }
  .swatch { display:inline-block; width:12px; height:12px; border-radius:3px; margin-right:6px; vertical-align:middle; }
  .hint { font-size:12px; color:#8595b0; margin-top:10px; }
  .center { text-align:center; }
  .secgrid { display:flex; gap:8px; margin:8px 0; }
  .secpill { flex:1; text-align:center; padding:6px; border-radius:6px; background:#1b2540; font-size:12px; border:2px solid #2c3a63;}
  .secpill.target { border-color:#ffd24d; color:#ffd24d; font-weight:700;}
</style>
</head>
<body>
<div id="wrap">
  <h1>🏁 SCRAMBLE RACERS <span style="font-size:13px;color:#8595b0;">— prototype</span></h1>
  <canvas id="game" width="960" height="540"></canvas>

  <!-- DRAFT -->
  <div id="draftPanel" class="panel">
    <h2>Build your racer</h2>
    <p class="sub">Pick one option per attribute. Each is great in some situations, awful in others — and the track will change under you.</p>
    <div class="slots" id="draftSlots"></div>
    <div class="center"><button class="btn" id="draftStart" disabled>START RACE 1</button></div>
  </div>

  <!-- RESULTS -->
  <div id="resultPanel" class="panel">
    <h2 id="resultTitle">Race results</h2>
    <p class="sub" id="resultSub"></p>
    <div class="row">
      <div class="scorebox"><table id="resultTable"></table></div>
      <div style="flex:1">
        <div id="resultFlavor" style="font-size:14px;color:#cdd8ec;line-height:1.5"></div>
      </div>
    </div>
    <div class="center" style="margin-top:16px"><button class="btn" id="resultNext">CONTINUE</button></div>
  </div>

  <!-- ESCALATION -->
  <div id="escPanel" class="panel">
    <h2>Scramble phase</h2>
    <p class="sub" id="escSub"></p>
    <div class="row">
      <div style="flex:1">
        <div class="slot-title" style="text-align:left">🔧 Re-roll your <span id="escSlotName"></span></div>
        <div id="escAttrCards"></div>
      </div>
      <div style="flex:1">
        <div class="slot-title" style="text-align:left">🗺️ Modify <span id="escSecName"></span></div>
        <div class="secgrid" id="escSecMap"></div>
        <div id="escModCards"></div>
      </div>
    </div>
    <div class="center"><button class="btn" id="escNext" disabled>RACE!</button></div>
  </div>

  <!-- FINAL -->
  <div id="finalPanel" class="panel">
    <h2 id="finalTitle">🏆 Final standings</h2>
    <div class="row">
      <div class="scorebox"><table id="finalTable"></table></div>
      <div style="flex:1" id="finalFlavor"></div>
    </div>
    <div class="center" style="margin-top:18px"><button class="btn" id="finalRestart">PLAY AGAIN</button></div>
  </div>
</div>

<script>
//////////////////// CONFIG ////////////////////
const CW = 960, CH = 540;
const GROUND_Y = 470;          // top of the floor
const TRACK_LEN = 6400;
const NUM_SECTIONS = 5;
const SEC_W = TRACK_LEN / NUM_SECTIONS;
const FINISH_X = TRACK_LEN - 220;
const RACES = 4;               // last one is double points
const PLAYER_W = 26, PLAYER_H = 34;

// base physics — a touch slower & floatier so positioning/timing matters more than holding →
const BASE_SPEED = 3.45;
const ACCEL_G = 0.55, ACCEL_A = 0.3;
const JUMP_V = 12.5;
const BASE_GRAV = 0.58;
const TERMINAL = 16;

const COLORS = ['#e74c3c','#3aa6ff','#2ecc71','#f5c542'];
const NAMES  = ['You','CPU Rex','CPU Mim','CPU Zoo'];

//////////////////// OPTION POOLS ////////////////////
// numeric mods (speed/jump/gravity) multiply; others are flags.
const POOLS = {
  helmet: [
    {name:'Balloon Helmet', icon:'🎈', desc:'Floaty: gravity ×0.7, run ×0.9', mods:{gravity:0.7, speed:0.9}},
    {name:'Lead Helmet',    icon:'🪨', desc:'Heavy: run ×1.15, fall fast, jump ×0.8', mods:{gravity:1.35, speed:1.15, jump:0.8}},
    {name:'Propeller Helmet',icon:'🚁',desc:'Hold JUMP while falling to GLIDE slowly', mods:{glide:true}},
    {name:'Glider Wings',   icon:'🦅', desc:'Strong glide + air control — king of flying over terrain', mods:{glide:true, aircontrol:true, fallcap:5}},
    {name:'Spring Helmet',  icon:'🌀', desc:'Auto-hop every time you land', mods:{autohop:true}},
    {name:'Rocket Helmet',  icon:'🚀', desc:'Automatic upward thrust every ~2s', mods:{rocket:true}},
    {name:'Feather Crown',  icon:'🪶', desc:'Slow, gentle falls (low terminal speed)', mods:{fallcap:7}},
  ],
  gravity: [
    {name:'Moon Gravity',   icon:'🌙', desc:'Very low gravity — huge floaty jumps', mods:{gravity:0.6}},
    {name:'Earth Gravity',  icon:'🌍', desc:'Normal & dependable', mods:{}},
    {name:'Jupiter Gravity',icon:'🪐', desc:'Heavy — fast falls, snappy but low jumps', mods:{gravity:1.5, jump:0.92}},
    {name:'Yo-Yo Gravity',  icon:'🪀', desc:'Bounce upward every time you land', mods:{bounce:true}},
    {name:'Drift Gravity',  icon:'💨', desc:'gravity ×0.8, extra air control', mods:{gravity:0.8, aircontrol:true}},
  ],
  shoes: [
    {name:'Sprint Spikes',  icon:'👟', desc:'Run speed ×1.25', mods:{speed:1.25}},
    {name:'Spring Boots',   icon:'🥾', desc:'Jump ×1.35', mods:{jump:1.35}},
    {name:'Grip Treads',    icon:'🧦', desc:'Immune to ice & slippery surfaces', mods:{grip:true}},
    {name:'Roller Skates',  icon:'🛼', desc:'Run ×1.4 but always slippery', mods:{speed:1.4, slippery:true}},
    {name:'Moon Boots',     icon:'👢', desc:'Jump ×1.2, gravity ×0.85', mods:{jump:1.2, gravity:0.85}},
  ],
  ability: [
    {name:'Dash',        icon:'💨', desc:'SPACE: burst forward', mods:{ability:'dash'}},
    {name:'Jetpack',     icon:'🛸', desc:'SPACE: thrust up — hold to FLY over hazards', mods:{ability:'flap'}},
    {name:'Double Jump', icon:'⏫', desc:'Press JUMP (↑/W) again in mid-air', mods:{ability:'djump'}},
    {name:'Ground Pound',icon:'💥', desc:'SPACE in air: slam straight down', mods:{ability:'pound'}},
    {name:'Blink',       icon:'✨', desc:'SPACE: teleport a short hop forward', mods:{ability:'blink'}},
    {name:'Super Jump',  icon:'🦘', desc:'SPACE on ground: launch sky-high', mods:{ability:'superjump'}},
  ],
};
const SLOT_ORDER = ['helmet','gravity','shoes','ability'];
const SLOT_LABEL = {helmet:'Helmet', gravity:'Gravity', shoes:'Shoes', ability:'Ability'};
// emoji shown above a character's head for each helmet
const HELMET_ICON = {'Balloon Helmet':'🎈','Lead Helmet':'🪨','Propeller Helmet':'🚁','Glider Wings':'🦅','Spring Helmet':'🌀','Rocket Helmet':'🚀','Feather Crown':'👑'};

// map modifiers.  surfaceGrounded types (ice/sand/mud/boost) ONLY apply while you're
// standing on them — flying/gliding over them is a legit way around.  wind hits you in the air too.
const MAP_MODS = [
  {type:'ice',    name:'Ice',          icon:'❄️', desc:'Slippery — but only while grounded. Fly over to skip it!', color:'#bfe9ff'},
  {type:'sand',   name:'Sand',         icon:'🏜️', desc:'Slows you on the ground only — airborne dodges it', color:'#e8d39a'},
  {type:'mud',    name:'Sticky Mud',   icon:'🟫', desc:'Big ground slowdown — glide/fly over to skip it', color:'#7a5a3a'},
  {type:'boost',  name:'Boost Strip',  icon:'⏩', desc:'Ground speed strip → (only while running on it)', color:'#ff8a3d'},
  {type:'wind',   name:'Headwind',     icon:'🌬️', desc:'Pushes you back ← — hits you even in the air, no escape', color:'#9fb6c9'},
  {type:'bounce', name:'Bounce Pads',  icon:'🟣', desc:'Pads fling you upward on contact', color:'#ff5fb0'},
  {type:'spring', name:'Springboard',  icon:'⤴️', desc:'A big launch ramp — up & forward', color:'#c98bff'},
  {type:'spikes', name:'Spike Trap',   icon:'🔺', desc:'Hit it and lose your momentum (jump or fly over!)', color:'#ff4d4d'},
  // "go-for-it" boosts — aim to hit these; great equalizer vs. fast builds
  {type:'boostpad',name:'Boost Pad',   icon:'⚡', desc:'Slam it for a big forward speed burst →', color:'#ffd23d'},
  {type:'slide',   name:'Slide',       icon:'🛝', desc:'Ride it to launch up & forward in an arc', color:'#5fd0ff'},
  {type:'cannon',  name:'Launch Cannon',icon:'💣', desc:'Blasts you in a huge arc down the track', color:'#ff7b00'},
  {type:'zipline', name:'Speed Rings',  icon:'💠', desc:'A row of rings — fly through for repeated boosts', color:'#42f5b0'},
  {type:'ladder',  name:'Ladder & Perch',icon:'🪜',desc:'Climb (or fly!) to a high perch with a launch reward on top', color:'#b07a3c'},
  // sky stuff — rewards flying builds
  {type:'skyring', name:'Sky Rings',    icon:'💫', desc:'A trail of boost rings up high — only flyers can cash them in', color:'#7fe7ff'},
  {type:'updraft', name:'Updraft',      icon:'🌪️', desc:'A column of rising air that lifts you toward the sky route', color:'#cfeaff'},
];
const MAP_BY_TYPE = Object.fromEntries(MAP_MODS.map(m=>[m.type,m]));

//////////////////// UTIL ////////////////////
function deal(pool, n=3){
  const a = pool.slice();
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a.slice(0,n);
}
const rand = (a)=> a[Math.floor(Math.random()*a.length)];
const clamp = (v,lo,hi)=> v<lo?lo:(v>hi?hi:v);

function computeStats(build){
  const s = {speed:1, jump:1, gravity:1};
  const f = {ability:null};
  for(const slot of SLOT_ORDER){
    const m = build[slot].mods;
    for(const k in m){
      if(k==='speed'||k==='jump'||k==='gravity') s[k]*=m[k];
      else f[k]=m[k];
    }
  }
  return {speed:s.speed, jump:s.jump, gravity:s.gravity, flags:f};
}

//////////////////// GAME STATE ////////////////////
let players = [];     // {idx,name,color,build,stats,points,...physics}
let sections = [];     // {mods:[type,...]}
let raceNum = 0;
let state = 'draft';   // draft | race | results | esc | final
let keys = {};
let lastFinishOrder = [];

const $ = id => document.getElementById(id);
const canvas = $('game'), ctx = canvas.getContext('2d');

function newPlayer(i){
  return {
    idx:i, name:NAMES[i], color:COLORS[i],
    build:{}, stats:null, points:0,
    x:60 + i*6, y:GROUND_Y-PLAYER_H, vx:0, vy:0,
    grounded:false, djumpUsed:false, dash:0, abilityCd:0, abilityCdMax:1, abBuffer:0, flapCd:0, climbing:false, ladderCd:0,
    stun:0, invuln:0, padCd:0,
    fx:'', fxT:0, rocketT:0, finished:false, finishTime:0, place:0, speedJitter:0.96+Math.random()*0.09,
    aiJumpCd:0
  };
}

function resetMatch(){
  players = [0,1,2,3].map(newPlayer);
  sections = Array.from({length:NUM_SECTIONS},()=>({mods:[]}));
  raceNum = 0;
}

//////////////////// TRACK BUILD ////////////////////
let solids = [];   // collision rects {x,y,w,h}
let triggers = []; // {type,x,y,w,h}
let baseLayout = [];

function buildBaseLayout(){
  // Ground-level hurdles are kept LOW (<=22px) so even the worst jump build
  // (heavy gravity + reduced jump) can always clear them — no permanent traps.
  // Tall "platforms" are floated high up as OPTIONAL shortcuts that never block
  // the ground path (their underside sits above any reachable jump height).
  baseLayout = [];
  const HURDLE_H = 22;             // kept low so any build clears them (no traps)
  for(const x of [1000, 2500, 3900, 5400]){
    baseLayout.push({x, y:GROUND_Y - HURDLE_H, w:34, h:HURDLE_H, kind:'block'});
  }
  // BIG floating platforms at varied heights — a real aerial route. High ones (≈240px up)
  // are flyer/high-jump territory; mid ones double as landing pads. Undersides sit above
  // head height so ground runners pass underneath freely.
  const plats = [
    {x:1450, y:GROUND_Y-150, w:260}, {x:2150, y:GROUND_Y-250, w:190},
    {x:2950, y:GROUND_Y-160, w:250}, {x:3650, y:GROUND_Y-265, w:210},
    {x:4450, y:GROUND_Y-160, w:250}, {x:5150, y:GROUND_Y-255, w:210},
    {x:5850, y:GROUND_Y-150, w:250},
  ];
  for(const p of plats) baseLayout.push({x:p.x, y:p.y, w:p.w, h:22, kind:'plat'});
}

function rebuildTrackObjects(){
  // ground is one big solid; plus base blocks/platforms; plus spring objects from mods
  solids = [];
  solids.push({x:0, y:GROUND_Y, w:TRACK_LEN, h:CH-GROUND_Y});
  for(const b of baseLayout) solids.push({x:b.x,y:b.y,w:b.w,h:b.h,kind:b.kind});
  triggers = [];
  sections.forEach((sec,i)=>{
    const cx = i*SEC_W + SEC_W/2;
    sec.mods.forEach((t,k)=>{
      const off = (k-0.5)*120; // spread multiple objects in a section
      if(t==='spring'){
        triggers.push({type:'spring', x:cx+off-48, y:GROUND_Y-22, w:96, h:22});
      } else if(t==='spikes'){
        triggers.push({type:'spikes', x:cx+off-55, y:GROUND_Y-40, w:110, h:40});
      } else if(t==='bounce'){
        // discrete bounce pads (not a whole-floor effect) so you can still run between them
        for(let j=0;j<3;j++){
          triggers.push({type:'bounce', x:i*SEC_W + (j+1)*SEC_W/4 - 42, y:GROUND_Y-14, w:84, h:14});
        }
      } else if(t==='boostpad'){
        triggers.push({type:'boostpad', x:cx+off-48, y:GROUND_Y-16, w:96, h:16});
      } else if(t==='slide'){
        triggers.push({type:'slide', x:cx+off-80, y:GROUND_Y-88, w:160, h:88});
      } else if(t==='cannon'){
        triggers.push({type:'cannon', x:cx+off-32, y:GROUND_Y-56, w:64, h:56});
      } else if(t==='zipline'){
        for(let j=0;j<4;j++){
          triggers.push({type:'zipline', x:i*SEC_W + (j+1)*SEC_W/5 - 26, y:GROUND_Y-96, w:52, h:84});
        }
      } else if(t==='skyring'){
        // boost rings up HIGH — only flyers reach them
        for(let j=0;j<5;j++){
          triggers.push({type:'skyring', x:i*SEC_W + (j+1)*SEC_W/6 - 26, y:GROUND_Y-290, w:52, h:84});
        }
      } else if(t==='updraft'){
        triggers.push({type:'updraft', x:cx+off-55, y:GROUND_Y-330, w:110, h:330});
      } else if(t==='ladder'){
        // High route: climb the ladder (or fly!) straight up into a launch cannon that
        // blasts you forward. Ground below stays fully open, so it's always passable —
        // the high route is just faster, and flight beats climbing to it. No solid perch
        // (that would wedge climbers underneath); the perch is drawn decoratively only.
        const lx = cx+off-16, perchY = GROUND_Y-230;
        triggers.push({type:'ladder', x:lx, y:perchY, w:32, h:GROUND_Y-perchY});
      }
    });
  });
}

function sectionIndexAt(x){ return clamp(Math.floor(x/SEC_W),0,NUM_SECTIONS-1); }
function sectionHas(x,type){ return sections[sectionIndexAt(x)].mods.includes(type); }

//////////////////// PHYSICS ////////////////////
function aabb(a,b){ return a.x < b.x+b.w && a.x+a.w > b.x && a.y < b.y+b.h && a.y+a.h > b.y; }

function aiInput(p){
  // CPUs always push right, jump over things, occasionally use ability.
  // jumpHeld stays false so they don't auto-grab ladders (high route is a strategic option).
  const inp = {dir:1, jump:false, jumpHeld:false, ability:false};
  const feet = p.y+PLAYER_H;
  if(p.aiJumpCd>0) p.aiJumpCd--;
  // obstacle / spike ahead?
  let needJump=false;
  for(const s of solids){
    if(s.kind==='block'||s.kind==='plat'){
      if(s.x > p.x+PLAYER_W && s.x < p.x+PLAYER_W+78 && s.y < feet-6){ needJump=true; break; }
    }
  }
  for(const t of triggers){
    if(t.type==='spikes' && t.x > p.x && t.x < p.x+90){ needJump=true; break; }
  }
  // headwind / pit-ish: jump randomly to ride bounce sections
  if((needJump || (sectionHas(p.x,'bounce')&&Math.random()<0.04)) && p.grounded && p.aiJumpCd===0){
    inp.jump=true; p.aiJumpCd=12;
  }
  const ab = p.stats.flags.ability;
  // Jetpack CPUs: flap to fly over obstacles / hazardous ground
  if(ab==='flap'){
    const overBad = p.grounded && (sectionHas(p.x,'mud')||sectionHas(p.x,'sand'));
    inp.abilityHeld = needJump || overBad || (!p.grounded && p.vy>2 && Math.random()<0.5);
  } else if(ab && p.grounded && p.abilityCd<=0 && Math.random()<0.012){
    inp.ability=true;
  }
  return inp;
}

function humanInput(p){
  const left = keys['ArrowLeft']||keys['a']||keys['A'];
  const right= keys['ArrowRight']||keys['d']||keys['D'];
  const jumpKey = keys['ArrowUp']||keys['w']||keys['W'];
  const abKey = keys[' ']||keys['Spacebar'];          // SPACE = ability (avoids Shift / sticky keys)
  return {
    dir: (right?1:0)-(left?1:0),
    jump: jumpKey && !p._jumpPrev,
    jumpHeld: jumpKey,
    ability: abKey && !p._abPrev,
    abilityHeld: abKey,
    _jumpKey:jumpKey, _abKey:abKey
  };
}

// returns true if the ability actually fired (so the input buffer can clear)
function doAbility(p){
  const ab = p.stats.flags.ability;
  const fx=(t,cd)=>{ p.fx=t; p.fxT=26; if(cd){p.abilityCd=cd; p.abilityCdMax=cd;} };
  if(ab==='dash'){ if(p.abilityCd<=0){ p.dash=10; fx('DASH!',45); return true; } }
  else if(ab==='blink'){ if(p.abilityCd<=0){ p.x += 120; fx('BLINK!',60); return true; } }
  else if(ab==='pound'){ if(!p.grounded){ p.vy = 22; fx('POUND!'); return true; } }
  else if(ab==='superjump'){ if(p.grounded){ p.vy = -JUMP_V*p.stats.jump*1.7; p.grounded=false; fx('LAUNCH!',30); return true; } }
  // djump is handled in the jump logic (it's bound to the JUMP key, not SHIFT)
  return false;
}
const ABILITY_KEY = {dash:'SPACE', flap:'SPACE (hold to fly)', blink:'SPACE', pound:'SPACE (mid-air)', superjump:'SPACE (on ground)', djump:'JUMP again mid-air'};

function updatePlayer(p, started){
  if(p.finished){ // glide to a stop past the line
    p.vx*=0.9; p.x+=p.vx; return;
  }
  if(!started){ return; }

  const inp = p.idx===0 ? humanInput(p) : aiInput(p);
  const st = p.stats, fl = st.flags;

  // are we overlapping a ladder this frame? (anyone can climb — keeps it always-passable)
  const pbox = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};
  let ladder=null;
  if(p.ladderCd<=0){ for(const t of triggers){ if(t.type==='ladder' && aabb(pbox,t)){ ladder=t; break; } } }
  p.climbing = false;

  // buffer the ability press for a few frames so it still fires if you tapped it
  // slightly early (just before landing, or just before the cooldown ends)
  if(inp.ability) p.abBuffer = 8;

  if(p.stun>0){ p.stun--; }
  else {
    // ability trigger (from buffer)
    if(p.abBuffer>0 && doAbility(p)) p.abBuffer = 0;
    // Jetpack: hold SHIFT for repeated upward thrust = controllable flight
    if(fl.ability==='flap' && inp.abilityHeld && p.flapCd<=0){
      p.vy = Math.min(p.vy, 0) - 6.2; p.grounded=false; p.flapCd=11; p.fx='🔥'; p.fxT=8;
    }

    // climbing a ladder: hold JUMP/UP to go up. Reaching the top auto-launches you
    // forward off the perch (the reward), then briefly ignores the ladder so you don't re-grab.
    if(ladder && inp.jumpHeld){
      if(p.y <= ladder.y + 4){
        // reached the perch top → fling forward & up
        p.vy = -12; p.vx = (p.facing||1)*14; p.climbing=false; p.ladderCd=45; p.fx='🚀'; p.fxT=18;
      } else {
        p.climbing = true;
        p.vy = -3.6; p.grounded=false;
        const lc = ladder.x + ladder.w/2;
        p.vx = clamp((lc - (p.x+PLAYER_W/2))*0.2, -2, 2);
      }
    } else {
      // horizontal (surface effects ONLY while grounded — fly/glide to avoid them)
      let maxSpd = BASE_SPEED * st.speed * p.speedJitter;
      if(p.grounded && sectionHas(p.x,'sand')) maxSpd *= 0.62;
      if(p.grounded && sectionHas(p.x,'mud'))  maxSpd *= 0.45;

      const accel = p.grounded ? ACCEL_G : (fl.aircontrol?ACCEL_A*1.7:ACCEL_A);
      const dir = inp.dir;
      if(p.dash>0){
        p.vx = (p.facing||1) * maxSpd * 2.2; p.dash--;
      } else if(dir!==0){
        p.facing = dir;
        p.vx += dir*accel;
        p.vx = clamp(p.vx, -maxSpd*1.6, maxSpd*1.6);
        if(Math.abs(p.vx)>maxSpd && Math.sign(p.vx)===dir && !(p.grounded&&sectionHas(p.x,'boost'))) p.vx = dir*maxSpd;
      } else {
        // friction (icy only matters on the ground)
        const icy = (sectionHas(p.x,'ice')||fl.slippery) && !fl.grip;
        p.vx *= p.grounded ? (icy?0.985:0.80) : 0.97;
        if(Math.abs(p.vx)<0.05) p.vx=0;
      }
      // zone forces — boost only while running on it; wind hits you everywhere
      if(p.grounded && sectionHas(p.x,'boost')) p.vx = clamp(p.vx+0.55, -maxSpd*2, maxSpd*2.2);
      if(sectionHas(p.x,'wind'))  p.vx -= 0.22;

      // jump
      if(inp.jump){
        if(p.grounded){ p.vy = -JUMP_V*st.jump; p.grounded=false; p.djumpUsed=false; }
        else if(fl.ability==='djump' && !p.djumpUsed){ p.vy = -JUMP_V*st.jump; p.djumpUsed=true; }
      }
    }
  }

  // rocket helmet
  if(fl.rocket){ p.rocketT++; if(p.rocketT>=120){ p.rocketT=0; p.vy = -9; } }

  // gravity (suspended while actively climbing)
  if(!p.climbing){
    p.vy += BASE_GRAV*st.gravity;
    // glide — hold JUMP while falling to drift down slowly
    if(fl.glide && inp.jumpHeld && p.vy>0) p.vy = Math.min(p.vy, 1.8);
    const term = fl.fallcap || TERMINAL;
    if(p.vy>term) p.vy=term;
  }

  // integrate + collide
  const wasGrounded = p.grounded;
  moveAndCollide(p);

  // landing effects
  if(p.grounded && !wasGrounded){
    p.djumpUsed=false;
    if(fl.autohop) p.vy = -JUMP_V*st.jump*0.55, p.grounded=false;
    else if(fl.bounce) p.vy = -JUMP_V*st.jump*0.7, p.grounded=false;
  }

  // triggers (spring / spikes)
  const pb = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};
  for(const t of triggers){
    if(aabb(pb,t)){
      const fwd = p.facing||1;
      if(t.type==='spring'){ // launch up AND forward; brief cooldown so it can't re-fire in place
        if(p.padCd<=0 && p.vy>=0){ p.vy=-15; p.vx=fwd*Math.max(Math.abs(p.vx),6); p.grounded=false; p.padCd=22; }
      } else if(t.type==='bounce'){
        if(p.padCd<=0 && p.vy>=0){ p.vy=-12; p.grounded=false; p.padCd=14; }
      } else if(t.type==='spikes' && p.invuln<=0){
        // cost momentum + a little hop, but NEVER knock backward — you coast through during i-frames
        p.vx=fwd*1.5; p.vy=-4; p.stun=16; p.invuln=46;
      } else if(t.type==='boostpad'){
        if(p.padCd<=0){ p.vx=fwd*12; p.padCd=18; p.fx='ZOOM!'; p.fxT=20; }
      } else if(t.type==='slide'){
        // big ramp: launches you up & forward in a satisfying arc
        if(p.padCd<=0){ p.vy=-14; p.vx=fwd*Math.max(Math.abs(p.vx),12); p.grounded=false; p.padCd=22; p.fx='WHEE!'; p.fxT=20; }
      } else if(t.type==='cannon'){
        if(p.padCd<=0){ p.vy=-14; p.vx=fwd*18; p.grounded=false; p.padCd=34; p.fx='BLAST!'; p.fxT=24; }
      } else if(t.type==='zipline' || t.type==='skyring'){
        // speed rings: each ring you pass through gives a repeatable forward nudge
        if(p.padCd<=0){ p.vx=fwd*Math.max(Math.abs(p.vx),11); p.padCd=4; if(t.type==='skyring'){p.fx='✨';p.fxT=10;} }
      } else if(t.type==='updraft'){
        // rising air column: strong lift while inside (great for getting up to the sky route)
        p.vy -= 1.05; if(p.vy < -8) p.vy = -8; p.grounded=false;
      }
    }
  }

  // cooldowns / timers
  if(p.abilityCd>0) p.abilityCd--;
  if(p.invuln>0) p.invuln--;
  if(p.padCd>0) p.padCd--;
  if(p.abBuffer>0) p.abBuffer--;
  if(p.flapCd>0) p.flapCd--;
  if(p.ladderCd>0) p.ladderCd--;
  if(p.fxT>0) p.fxT--;

  // bounds
  if(p.x<0){p.x=0; if(p.vx<0)p.vx=0;}

  // finish
  if(!p.finished && p.x+PLAYER_W >= FINISH_X){
    p.finished=true; p.finishTime=raceFrame;
    lastFinishOrder.push(p);
    p.place = lastFinishOrder.length;
  }

  // remember key edges for human
  if(p.idx===0){ p._jumpPrev = inp._jumpKey; p._abPrev = inp._abKey; }
}

function moveAndCollide(p){
  // while climbing a ladder, phase through platforms/blocks so you always reach the top
  const phase = p.climbing;
  // horizontal
  const STEP_H = 24; // ledges this short are auto-stepped (never block you)
  p.x += p.vx;
  let box = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};
  for(const s of solids){
    if(phase && s.kind) continue;
    if(aabb(box,s)){
      const feet = p.y+PLAYER_H;
      // if it's just a small step up, climb onto it instead of stopping dead
      if(s.y >= feet - STEP_H && s.y < feet){
        p.y = s.y - PLAYER_H; box.y = p.y; p.grounded = true; p.vy = 0;
      } else {
        if(p.vx>0){ p.x = s.x - PLAYER_W; }
        else if(p.vx<0){ p.x = s.x + s.w; }
        p.vx=0; box.x=p.x;
      }
    }
  }
  // vertical
  p.y += p.vy;
  box = {x:p.x,y:p.y,w:PLAYER_W,h:PLAYER_H};
  p.grounded=false;
  for(const s of solids){
    if(phase && s.kind) continue;
    if(aabb(box,s)){
      if(p.vy>0){ p.y = s.y - PLAYER_H; p.vy=0; p.grounded=true; }
      else if(p.vy<0){ p.y = s.y + s.h; p.vy=0; }
      box.y=p.y;
    }
  }
}

//////////////////// RACE LOOP ////////////////////
let raceFrame=0, countdown=0, started=false, cameraX=0;

function startRace(){
  // reset players to start
  lastFinishOrder = [];
  rebuildTrackObjects();
  players.forEach((p,i)=>{
    p.stats = computeStats(p.build);
    p.x = 60 + i*6; p.y = GROUND_Y-PLAYER_H; p.vx=0; p.vy=0;
    p.grounded=true; p.djumpUsed=false; p.dash=0; p.abilityCd=0; p.abBuffer=0; p.flapCd=0; p.climbing=false; p.ladderCd=0; p.stun=0; p.invuln=0; p.padCd=0; p.fx=''; p.fxT=0;
    p.rocketT=0; p.finished=false; p.place=0; p.facing=1; p.aiJumpCd=0;
    p.speedJitter = i===0?1.0:(0.95+Math.random()*0.09);
  });
  raceFrame=0; countdown=180; started=false; cameraX=0;
  setState('race');
}

function raceTick(){
  raceFrame++;
  if(countdown>0){ countdown--; if(countdown===0) started=true; }

  for(const p of players) updatePlayer(p, started);

  // failsafe end
  const everyone = lastFinishOrder.length>=4;
  const timeout = raceFrame > 60*70;
  if(everyone || timeout){
    if(timeout){
      // rank the not-yet-finished by x
      const left = players.filter(p=>!p.finished).sort((a,b)=>b.x-a.x);
      for(const p of left){ p.finished=true; lastFinishOrder.push(p); p.place=lastFinishOrder.length; }
    }
    endRace();
    return;
  }

  // camera follows human
  const me = players[0];
  cameraX = clamp(me.x - CW*0.32, 0, TRACK_LEN - CW);
}

function endRace(){
  // award points
  const ptsTable = [4,3,2,1];
  const mult = (raceNum === RACES-1) ? 2 : 1;
  lastFinishOrder.forEach((p,i)=>{ p.gained = ptsTable[i]*mult; p.points += p.gained; });
  showResults(mult);
}

//////////////////// RENDER ////////////////////
const CLOUDS = [{x:200,y:70,s:1},{x:620,y:120,s:.8},{x:1050,y:60,s:1.1},{x:1500,y:140,s:.7},
  {x:1950,y:90,s:1},{x:2500,y:130,s:.9},{x:3100,y:70,s:1.1},{x:3700,y:120,s:.8},
  {x:4300,y:90,s:1},{x:5000,y:140,s:.7},{x:5700,y:70,s:1}];
const HILLS = [];
for(let i=0;i<22;i++) HILLS.push({x:i*420, h:90+((i*53)%70), w:340});
function cloud(x,y,s){
  ctx.fillStyle='rgba(255,255,255,.92)';
  ctx.beginPath();
  ctx.arc(x,y,22*s,0,7); ctx.arc(x+26*s,y+6*s,28*s,0,7); ctx.arc(x+58*s,y,20*s,0,7);
  ctx.arc(x+28*s,y-14*s,22*s,0,7); ctx.closePath(); ctx.fill();
}
function drawBackdrop(){
  // sun
  ctx.save();
  ctx.fillStyle='rgba(255,241,150,.95)'; ctx.beginPath(); ctx.arc(CW-110,80,42,0,7); ctx.fill();
  ctx.fillStyle='rgba(255,241,150,.25)'; ctx.beginPath(); ctx.arc(CW-110,80,62,0,7); ctx.fill();
  ctx.restore();
  // far hills (slow parallax)
  const hOff = cameraX*0.25;
  ctx.fillStyle='#9ccf8f';
  for(const h of HILLS){
    const x = h.x - (hOff % (HILLS.length*420));
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.quadraticCurveTo(x+h.w/2, GROUND_Y-h.h, x+h.w, GROUND_Y); ctx.fill();
  }
  ctx.fillStyle='#7fbf86';
  for(const h of HILLS){
    const x = h.x+180 - (cameraX*0.4 % (HILLS.length*420));
    ctx.beginPath(); ctx.moveTo(x, GROUND_Y); ctx.quadraticCurveTo(x+h.w/2, GROUND_Y-h.h*0.7, x+h.w, GROUND_Y); ctx.fill();
  }
  // clouds (medium parallax)
  const cOff = cameraX*0.5;
  for(const c of CLOUDS){ cloud(c.x - (cOff % 6200), c.y, c.s); }
}
function draw(){
  ctx.clearRect(0,0,CW,CH);
  // sky gradient
  const g = ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#7fb2ee'); g.addColorStop(0.6,'#a9d4f5'); g.addColorStop(1,'#dff0ff');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);

  drawBackdrop();

  ctx.save();
  ctx.translate(-cameraX,0);

  // section floors (colored by mods)
  for(let i=0;i<NUM_SECTIONS;i++){
    const sx=i*SEC_W;
    let col='#6ab04c';
    const mods=sections[i].mods;
    for(const t of mods){ if(['ice','sand','mud'].includes(t)) col=MAP_BY_TYPE[t].color; }
    ctx.fillStyle=col;
    ctx.fillRect(sx, GROUND_Y, SEC_W, CH-GROUND_Y);
    ctx.fillStyle='rgba(0,0,0,.12)';
    ctx.fillRect(sx, GROUND_Y, SEC_W, 6);
    // zone tint for boost/wind/bounce
    for(const t of mods){
      if(t==='boost'){ stripeZone(sx,'#ff8a3d','→'); }
      else if(t==='wind'){ stripeZone(sx,'#9fb6c9','←'); }
    }
    // section divider + label
    ctx.fillStyle='rgba(255,255,255,.4)'; ctx.fillRect(sx,0,2,CH);
    ctx.fillStyle='rgba(20,30,55,.55)'; ctx.font='bold 12px Segoe UI';
    ctx.fillText('SECTION '+(i+1), sx+10, 20);
  }

  // base blocks/platforms
  for(const b of baseLayout){
    ctx.fillStyle = b.kind==='plat' ? '#8a5a2b' : '#5a4632';
    ctx.fillRect(b.x,b.y,b.w,b.h);
    ctx.fillStyle='rgba(255,255,255,.18)'; ctx.fillRect(b.x,b.y,b.w,4);
  }
  // triggers
  for(const t of triggers){
    if(t.type==='spring'){
      ctx.fillStyle='#c98bff'; ctx.fillRect(t.x,t.y,t.w,t.h);
      ctx.fillStyle='#fff'; ctx.font='bold 12px Segoe UI'; ctx.fillText('↑',t.x+t.w/2-4,t.y+11);
    } else if(t.type==='bounce'){
      ctx.fillStyle='#ff5fb0'; roundRect(t.x,t.y,t.w,t.h,4); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillRect(t.x+4,t.y+2,t.w-8,2);
    } else if(t.type==='spikes'){
      ctx.fillStyle='#7a1d12'; ctx.fillRect(t.x, t.y+t.h-5, t.w, 5); // base bar
      ctx.fillStyle='#d23b27';
      for(let i=0;i<t.w-2;i+=18){ ctx.beginPath(); ctx.moveTo(t.x+i,t.y+t.h); ctx.lineTo(t.x+i+9,t.y); ctx.lineTo(t.x+i+18,t.y+t.h); ctx.fill(); }
      ctx.fillStyle='rgba(255,255,255,.5)';
      for(let i=0;i<t.w-2;i+=18){ ctx.beginPath(); ctx.moveTo(t.x+i+9,t.y); ctx.lineTo(t.x+i+12,t.y+8); ctx.lineTo(t.x+i+9,t.y+8); ctx.fill(); }
    } else if(t.type==='boostpad'){
      ctx.fillStyle='#ffd23d'; roundRect(t.x,t.y,t.w,t.h,4); ctx.fill();
      ctx.fillStyle='#a06b00'; ctx.font='bold 17px Segoe UI'; ctx.textAlign='center';
      ctx.fillText('»»»', t.x+t.w/2, t.y+t.h-3); ctx.textAlign='left';
    } else if(t.type==='slide'){
      // big ramp rising to the right, with grippy stripes + an arrow so it's unmistakable
      ctx.fillStyle='#37b6ef'; ctx.beginPath();
      ctx.moveTo(t.x, t.y+t.h); ctx.lineTo(t.x+t.w, t.y); ctx.lineTo(t.x+t.w, t.y+t.h); ctx.closePath(); ctx.fill();
      ctx.strokeStyle='rgba(255,255,255,.6)'; ctx.lineWidth=3;
      for(let s=0.2;s<1;s+=0.2){ ctx.beginPath(); ctx.moveTo(t.x+t.w*s, t.y+t.h); ctx.lineTo(t.x+t.w*s, t.y+t.h-(t.h*s)); ctx.stroke(); }
      ctx.fillStyle='#fff'; ctx.font='22px Segoe UI Emoji'; ctx.fillText('🛝', t.x+t.w*0.32, t.y+t.h-12);
    } else if(t.type==='cannon'){
      ctx.fillStyle='#ff7b00'; roundRect(t.x,t.y+t.h-18,t.w,18,4); ctx.fill(); // base
      ctx.save(); ctx.translate(t.x+t.w/2, t.y+t.h-12); ctx.rotate(-0.6);
      ctx.fillStyle='#333'; roundRect(0,-9,t.w*0.95,18,4); ctx.fill();
      ctx.fillStyle='#111'; ctx.beginPath(); ctx.arc(t.w*0.95,0,9,-1.5,1.5); ctx.fill(); ctx.restore();
    } else if(t.type==='zipline' || t.type==='skyring'){
      ctx.strokeStyle = t.type==='skyring' ? '#7fe7ff' : '#42f5b0'; ctx.lineWidth=5;
      ctx.beginPath(); ctx.ellipse(t.x+t.w/2, t.y+t.h/2, t.w/2-2, t.h/2-2, 0, 0, Math.PI*2); ctx.stroke();
      ctx.strokeStyle='rgba(255,255,255,.5)'; ctx.lineWidth=2;
      ctx.beginPath(); ctx.ellipse(t.x+t.w/2, t.y+t.h/2, t.w/2-7, t.h/2-7, 0, 0, Math.PI*2); ctx.stroke();
    } else if(t.type==='updraft'){
      ctx.save(); ctx.fillStyle='rgba(150,210,255,.22)'; ctx.fillRect(t.x,t.y,t.w,t.h);
      ctx.fillStyle='rgba(255,255,255,.55)'; ctx.font='26px Segoe UI';
      for(let yy=t.y+30; yy<t.y+t.h; yy+=70){ ctx.fillText('⤊', t.x+t.w/2-9, yy); }
      ctx.restore();
    } else if(t.type==='ladder'){
      // decorative perch slab on top
      ctx.fillStyle='#caa06a'; roundRect(t.x-12, t.y-6, 132, 12, 3); ctx.fill();
      ctx.fillStyle='rgba(255,255,255,.25)'; ctx.fillRect(t.x-12, t.y-6, 132, 3);
      // ladder rails + rungs
      ctx.strokeStyle='#8a5a2b'; ctx.lineWidth=3;
      ctx.beginPath();
      ctx.moveTo(t.x+3,t.y); ctx.lineTo(t.x+3,t.y+t.h);
      ctx.moveTo(t.x+t.w-3,t.y); ctx.lineTo(t.x+t.w-3,t.y+t.h);
      for(let ry=t.y+8; ry<t.y+t.h; ry+=14){ ctx.moveTo(t.x+3,ry); ctx.lineTo(t.x+t.w-3,ry); }
      ctx.stroke();
    }
  }

  // finish line
  drawFinish();

  // players
  for(const p of players) drawPlayer(p);

  ctx.restore();

  // HUD
  drawHUD();

  if(countdown>0 && state==='race') drawCountdown();
}

function stripeZone(sx,color,arrow){
  ctx.save();
  ctx.globalAlpha=0.18; ctx.fillStyle=color;
  ctx.fillRect(sx,0,SEC_W,GROUND_Y);
  ctx.globalAlpha=0.8; ctx.fillStyle=color; ctx.font='bold 40px Segoe UI';
  for(let x=sx+40;x<sx+SEC_W;x+=160) ctx.fillText(arrow,x,GROUND_Y-30);
  ctx.restore();
}

function drawFinish(){
  const x=FINISH_X;
  ctx.fillStyle='#fff'; ctx.fillRect(x,0,8,GROUND_Y);
  const sq=14;
  for(let y=0;y<GROUND_Y;y+=sq){
    for(let c=0;c<2;c++){
      ctx.fillStyle = ((Math.floor(y/sq)+c)%2===0)?'#111':'#fff';
      ctx.fillRect(x+c*sq, y, sq, sq);
    }
  }
}

function drawPlayer(p){
  const air = !p.grounded;
  // squash & stretch from vertical speed
  const stretch = clamp(1 + p.vy*0.012, 0.82, 1.2);
  const w = PLAYER_W / Math.sqrt(stretch), h = PLAYER_H * stretch;
  const dir = p.facing>=0?1:-1;

  // ground shadow
  if(!air){ ctx.fillStyle='rgba(0,0,0,.18)'; ctx.beginPath(); ctx.ellipse(p.x+PLAYER_W/2, GROUND_Y-2, 16, 5, 0, 0, 7); ctx.fill(); }

  ctx.save();
  ctx.translate(p.x+PLAYER_W/2, p.y+PLAYER_H); // anchor at feet center
  // dash/speed trail
  if(p.dash>0){ ctx.globalAlpha=0.35; ctx.fillStyle=p.color; roundRect(-dir*14-w/2,-h,w,h,8); ctx.fill(); ctx.globalAlpha=1; }
  // little feet
  ctx.fillStyle='#2a2a2a';
  const fb = air?3:0;
  ctx.beginPath(); ctx.ellipse(-6, -fb, 6, 4, 0,0,7); ctx.ellipse(6, fb, 6, 4, 0,0,7); ctx.fill();
  // body (rounded, with a lighter belly)
  ctx.fillStyle=p.color; roundRect(-w/2,-h,w,h,9); ctx.fill();
  ctx.fillStyle='rgba(255,255,255,.18)'; roundRect(-w/2+3,-h+3,w-6,h*0.5,7); ctx.fill();
  if(p.stun>0){ ctx.fillStyle='rgba(255,255,255,.45)'; roundRect(-w/2,-h,w,h,9); ctx.fill(); }
  // face
  const eyY = -h+13, eoff = 5*dir;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(eoff-4, eyY, 5,0,7); ctx.arc(eoff+6, eyY, 5,0,7); ctx.fill();
  ctx.fillStyle='#111';
  if(p.stun>0){ // dizzy X eyes
    ctx.font='bold 9px Segoe UI'; ctx.fillText('x', eoff-7, eyY+3); ctx.fillText('x', eoff+3, eyY+3);
  } else {
    const pu = dir*1.5;
    ctx.beginPath(); ctx.arc(eoff-4+pu, eyY, 2.2,0,7); ctx.arc(eoff+6+pu, eyY, 2.2,0,7); ctx.fill();
  }
  // mouth: open when airborne / excited, smile otherwise
  ctx.strokeStyle='#111'; ctx.lineWidth=1.6; ctx.beginPath();
  if(air){ ctx.fillStyle='#5a1a1a'; ctx.beginPath(); ctx.arc(eoff+1, -h+22, 3.2,0,7); ctx.fill(); }
  else { ctx.arc(eoff+1, -h+19, 4, 0.15*Math.PI, 0.85*Math.PI); ctx.stroke(); }
  ctx.restore();

  const headTop = p.y + PLAYER_H - h;
  // helmet emoji sitting on the head
  const hi = (p.build && p.build.helmet) ? HELMET_ICON[p.build.helmet.name] : null;
  if(hi){
    ctx.save(); ctx.textAlign='center'; ctx.font='18px Segoe UI Emoji';
    ctx.fillText(hi, p.x+PLAYER_W/2, headTop + 11);
    ctx.restore();
  }
  // name tag floats above the helmet
  ctx.fillStyle = p.idx===0 ? 'rgba(150,100,0,.9)':'rgba(0,0,0,.5)'; ctx.textAlign='center'; ctx.font='bold 11px Segoe UI';
  ctx.fillText(p.name, p.x+PLAYER_W/2, headTop-16); ctx.textAlign='left';
  // ability/feedback popup text
  if(p.fxT>0 && p.fx){
    ctx.globalAlpha = Math.min(1, p.fxT/12);
    ctx.fillStyle = p.idx===0 ? '#ffd24d' : '#fff';
    ctx.font='bold 14px Segoe UI';
    ctx.fillText(p.fx, p.x-4, p.y-22 - (26-p.fxT)*0.8);
    ctx.globalAlpha=1;
  }
}

function roundRect(x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y); ctx.arcTo(x+w,y,x+w,y+h,r); ctx.arcTo(x+w,y+h,x,y+h,r);
  ctx.arcTo(x,y+h,x,y,r); ctx.arcTo(x,y,x+w,y,r); ctx.closePath();
}

function drawHUD(){
  // progress bar
  const barX=20, barY=46, barW=CW-40, barH=10;
  ctx.fillStyle='rgba(0,0,0,.35)'; ctx.fillRect(barX,barY,barW,barH);
  ctx.fillStyle='rgba(255,255,255,.7)'; ctx.fillRect(barX+barW-3,barY-4,3,barH+8); // finish
  for(const p of players){
    const t = clamp(p.x/FINISH_X,0,1);
    ctx.fillStyle=p.color;
    ctx.beginPath(); ctx.arc(barX+t*barW, barY+barH/2, 6, 0, Math.PI*2); ctx.fill();
    ctx.strokeStyle='#fff'; ctx.lineWidth=1.5; ctx.stroke();
  }
  // race header
  ctx.fillStyle='rgba(10,16,30,.7)'; ctx.fillRect(20,8,250,30);
  ctx.fillStyle='#fff'; ctx.font='bold 16px Segoe UI';
  const dbl = (raceNum===RACES-1)?'  ★ DOUBLE POINTS':'';
  ctx.fillText(`RACE ${raceNum+1} / ${RACES}${dbl}`, 30, 28);

  // scoreboard (top-right)
  const sorted=[...players].sort((a,b)=>b.points-a.points);
  ctx.fillStyle='rgba(10,16,30,.7)'; ctx.fillRect(CW-210,8,190,86);
  ctx.font='12px Segoe UI';
  sorted.forEach((p,i)=>{
    ctx.fillStyle=p.color; ctx.fillRect(CW-202,16+i*19,10,10);
    ctx.fillStyle = p.idx===0?'#ffd24d':'#fff';
    ctx.fillText(`${p.name}`, CW-186,25+i*19);
    ctx.fillText(`${p.points} pts`, CW-60,25+i*19);
  });

  // controls hint (bottom-left)
  ctx.fillStyle='rgba(10,16,30,.55)'; ctx.fillRect(20, CH-30, 320, 24);
  ctx.fillStyle='#cfe0ff'; ctx.font='12px Segoe UI';
  ctx.fillText('← → / A D : move      ↑ / W : jump', 30, CH-14);

  // ability pill (bottom-right) — shows the real activation key + a charge bar
  const me=players[0];
  if(me.build.ability){
    const ab = me.build.ability.mods.ability;
    const key = ABILITY_KEY[ab] || 'SHIFT';
    const pillW=210, pillX=CW-pillW-20, pillY=CH-34, pillH=28;
    ctx.fillStyle='rgba(10,16,30,.8)'; roundRect(pillX,pillY,pillW,pillH,6); ctx.fill();
    // charge bar fill
    const ready = me.abilityCd<=0;
    const frac = ready ? 1 : 1 - (me.abilityCd/me.abilityCdMax);
    ctx.fillStyle = ready ? 'rgba(80,220,120,.35)' : 'rgba(255,210,77,.25)';
    roundRect(pillX, pillY, pillW*frac, pillH, 6); ctx.fill();
    ctx.fillStyle = ready ? '#7CFFA0' : '#ffd24d';
    ctx.font='bold 12px Segoe UI';
    ctx.fillText(`${key}: ${me.build.ability.name}`, pillX+10, pillY+13);
    ctx.fillStyle = ready ? '#bfffd0' : '#cdd8ec'; ctx.font='11px Segoe UI';
    ctx.fillText(ab==='djump' ? 'always available' : (ready?'READY':'charging…'), pillX+10, pillY+25);
  }
}

function drawCountdown(){
  const n = Math.ceil(countdown/60);
  ctx.fillStyle='rgba(0,0,0,.25)'; ctx.fillRect(0,0,CW,CH);
  ctx.fillStyle='#fff'; ctx.font='bold 90px Segoe UI'; ctx.textAlign='center';
  ctx.fillText(n>0?n:'GO!', CW/2, CH/2+20);
  ctx.textAlign='left';
}

//////////////////// PANELS / FLOW ////////////////////
function setState(s){
  state=s;
  $('draftPanel').classList.toggle('show', s==='draft');
  $('resultPanel').classList.toggle('show', s==='results');
  $('escPanel').classList.toggle('show', s==='esc');
  $('finalPanel').classList.toggle('show', s==='final');
}

// ---- DRAFT ----
let draftDealt={}, draftPick={};
function showDraft(){
  draftDealt={}; draftPick={};
  const wrap=$('draftSlots'); wrap.innerHTML='';
  for(const slot of SLOT_ORDER){
    draftDealt[slot]=deal(POOLS[slot],3);
    const col=document.createElement('div'); col.className='slot';
    const t=document.createElement('div'); t.className='slot-title'; t.textContent=SLOT_LABEL[slot];
    col.appendChild(t);
    draftDealt[slot].forEach(opt=>{
      col.appendChild(makeCard(opt, ()=>{
        draftPick[slot]=opt;
        [...col.querySelectorAll('.card')].forEach(c=>c.classList.remove('sel'));
        col._sel(opt);
        $('draftStart').disabled = Object.keys(draftPick).length<SLOT_ORDER.length;
      }, col));
    });
    wrap.appendChild(col);
  }
  // AI builds
  for(let i=1;i<4;i++){
    const b={}; for(const slot of SLOT_ORDER) b[slot]=rand(deal(POOLS[slot],3));
    players[i].build=b;
  }
  $('draftStart').disabled=true;
  setState('draft');
}
function makeCard(opt,onClick,col){
  const c=document.createElement('div'); c.className='card';
  const ic = opt.icon ? `<span class="cicon">${opt.icon}</span>` : '';
  c.innerHTML=`<div class="cname">${ic}${opt.name}</div><div class="cdesc">${opt.desc}</div>`;
  c.onclick=()=>onClick();
  c._opt=opt;
  if(col){ col._sel = (o)=>{ [...col.querySelectorAll('.card')].forEach(x=>x.classList.toggle('sel', x._opt===o)); }; }
  return c;
}
$('draftStart').onclick=()=>{
  players[0].build = {...draftPick};
  raceNum=0;
  startRace();
};

// ---- RESULTS ----
function showResults(mult){
  $('resultTitle').textContent = `Race ${raceNum+1} results`;
  $('resultSub').textContent = mult>1 ? '★ Final race — points were DOUBLED!' : 'Points: 4 / 3 / 2 / 1';
  const tbl=$('resultTable'); tbl.innerHTML='';
  lastFinishOrder.forEach((p,i)=>{
    const tr=document.createElement('tr'); if(p.idx===0) tr.className='you';
    tr.innerHTML=`<td>${['🥇','🥈','🥉','4th'][i]}</td>
      <td><span class="swatch" style="background:${p.color}"></span>${p.name}</td>
      <td>+${p.gained}</td><td><b>${p.points}</b></td>`;
    tbl.appendChild(tr);
  });
  const me=players[0];
  $('resultFlavor').innerHTML = `You finished <b>${['1st','2nd','3rd','4th'][me.place-1]}</b>.<br><br>`+
    (raceNum<RACES-1
      ? 'Next up: the <b>Scramble phase</b> — everyone re-rolls one attribute and drops one new modifier somewhere on the shared track. It only gets weirder from here.'
      : 'That was the final race.');
  $('resultNext').textContent = raceNum<RACES-1 ? 'TO THE SCRAMBLE →' : 'SEE FINAL STANDINGS →';
  setState('results');
}
$('resultNext').onclick=()=>{
  if(raceNum<RACES-1) showEscalation();
  else showFinal();
};

// ---- ESCALATION ----
let escSlot=null, escSection=null, escAttrPick=null, escModPick=null;
function showEscalation(){
  // assign human a random slot + random section
  escSlot = rand(SLOT_ORDER);
  escSection = Math.floor(Math.random()*NUM_SECTIONS);
  escAttrPick=null; escModPick=null;
  $('escSub').textContent = `Round ${raceNum+1} done. Everyone gets one re-roll and one map edit. The CPUs are editing the track too…`;
  $('escSlotName').textContent = SLOT_LABEL[escSlot];
  $('escSecName').textContent = 'Section '+(escSection+1);

  // attribute cards
  const dealt = deal(POOLS[escSlot],3);
  const ac=$('escAttrCards'); ac.innerHTML='';
  dealt.forEach(opt=>{
    const c=makeCard(opt, ()=>{ escAttrPick=opt; markSel(ac,c); checkEscReady(); });
    ac.appendChild(c);
  });
  // map mod cards
  const dealtM = deal(MAP_MODS,3);
  const mc=$('escModCards'); mc.innerHTML='';
  dealtM.forEach(opt=>{
    const c=document.createElement('div'); c.className='card';
    c.innerHTML=`<div class="cname"><span class="cicon">${opt.icon||''}</span>${opt.name}</div><div class="cdesc">${opt.desc}</div>`;
    c.onclick=()=>{ escModPick=opt; markSel(mc,c); checkEscReady(); };
    mc.appendChild(c);
  });
  // section map
  const sm=$('escSecMap'); sm.innerHTML='';
  for(let i=0;i<NUM_SECTIONS;i++){
    const d=document.createElement('div'); d.className='secpill'+(i===escSection?' target':'');
    const tags = sections[i].mods.map(t=>MAP_BY_TYPE[t].icon).join(' ');
    d.innerHTML=`S${i+1}<br><span style="font-size:15px">${tags||'—'}</span>`;
    sm.appendChild(d);
  }
  $('escNext').disabled=true;
  setState('esc');

  // CPU choices (apply now): re-roll + add a random mod to a random section
  for(let i=1;i<4;i++){
    const slot=rand(SLOT_ORDER);
    players[i].build[slot]=rand(deal(POOLS[slot],3));
    const sec=Math.floor(Math.random()*NUM_SECTIONS);
    sections[sec].mods.push(rand(MAP_MODS).type);
  }
}
function markSel(container,card){ [...container.querySelectorAll('.card')].forEach(x=>x.classList.toggle('sel',x===card)); }
function checkEscReady(){ $('escNext').disabled = !(escAttrPick&&escModPick); }
$('escNext').onclick=()=>{
  players[0].build[escSlot]=escAttrPick;
  sections[escSection].mods.push(escModPick.type);
  raceNum++;
  startRace();
};

// ---- FINAL ----
function showFinal(){
  const sorted=[...players].sort((a,b)=>b.points-a.points);
  const tbl=$('finalTable'); tbl.innerHTML='';
  sorted.forEach((p,i)=>{
    const tr=document.createElement('tr'); if(p.idx===0) tr.className='you';
    tr.innerHTML=`<td>${['🥇','🥈','🥉','4th'][i]}</td>
      <td><span class="swatch" style="background:${p.color}"></span>${p.name}</td>
      <td><b>${p.points}</b> pts</td>`;
    tbl.appendChild(tr);
  });
  const meRank = sorted.findIndex(p=>p.idx===0)+1;
  $('finalTitle').textContent = meRank===1 ? '🏆 You win the tournament!' : `Tournament over — you placed ${['1st','2nd','3rd','4th'][meRank-1]}`;
  $('finalFlavor').innerHTML = `Final track had these section mods:<br><br>`+
    sections.map((s,i)=>`<b>S${i+1}:</b> ${s.mods.map(t=>MAP_BY_TYPE[t].name).join(', ')||'plain'}`).join('<br>');
  setState('final');
}
$('finalRestart').onclick=()=>{ resetMatch(); buildBaseLayout(); showDraft(); };

//////////////////// MAIN LOOP ////////////////////
function loop(){
  if(state==='race') raceTick();
  draw();
  requestAnimationFrame(loop);
}

window.addEventListener('keydown',e=>{
  keys[e.key]=true;
  if([' ','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

// boot
resetMatch();
buildBaseLayout();
showDraft();
loop();
</script>
